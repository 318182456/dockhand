name: Sync, Translate and Publish Docker

on:
  schedule:
    - cron: '0 2 * * *' # 每天北京时间上午 10 点 (JST 11:00) 自动同步并构建
  workflow_dispatch: # 支持手动触发构建

permissions:
  contents: write
  packages: write

jobs:
  sync-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Forked Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add Upstream Remote and Sync
        run: |
          # 绑定上游官方库并拉取
          git remote add upstream https://github.com/Finsys/dockhand.git || true
          git fetch upstream
          
          # 将上游主分支合并到当前主分支（如果存在冲突，采用上游为准或自动合并）
          git merge upstream/main --no-edit || {
            echo "合并冲突，尝试以 upstream 状态强行覆盖或标记解决"
            git merge --abort
            # 如需强行以官方为准，可以取消下面这行的注释
            # git reset --hard upstream/main
          }
          
          # 推送同步后的更新回本仓库
          git push origin HEAD:main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run Translate Script and Generate Lockfile
        run: |
          # 动态中文化：在构建 Docker 前直接在 CI 运行区修改源码文件
          # 这样 Dockerfile 中 COPY . . 时拷贝的就是翻译后的中文源码
          node scripts/translate.js
          # 官方库中只包含 bun.lock 而没有 package-lock.json，但 Dockerfile 里硬编码了 COPY package-lock.json，我们需要生成一个以防止 Docker 报错
          npm install --package-lock-only --ignore-scripts || true

      # 移除了 QEMU 步骤，因为我们不再编译 arm64，只编 amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: ${{ env.DOCKER_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
            ${{ secrets.DOCKER_USERNAME }}/dockhand
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
